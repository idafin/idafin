backend:
  name: git-gateway
  branch: main

# Geliştirmede `npx decap-server` ile çalıştır, sonra bu dosyada
# local_backend: true olarak ayarla. Production'da Netlify Identity / GitHub
# kullan ve aşağıdaki satırı yorum satırı yap.
local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

locale: "tr"

collections:
  - name: "settings"
    label: "Site Ayarları"
    files:
      - name: "site"
        label: "Genel"
        file: "src/data/site.json"
        format: "json"
        fields:
          - { name: "brand", label: "Marka", widget: "string" }
          - { name: "establishedLabel", label: "Kuruluş etiketi", widget: "string" }
          - name: "nav"
            label: "Menü"
            widget: "list"
            fields:
              - { name: "n", label: "Sıra", widget: "string" }
              - { name: "label", label: "Etiket", widget: "string" }
              - { name: "href", label: "Bağlantı", widget: "string" }
          - name: "ctaPrimary"
            label: "Birincil CTA"
            widget: "object"
            fields:
              - { name: "label", label: "Etiket", widget: "string" }
              - { name: "href", label: "Bağlantı", widget: "string" }
          - name: "contact"
            label: "İletişim"
            widget: "object"
            fields:
              - { name: "email", label: "E-posta", widget: "string" }
              - { name: "address", label: "Adres", widget: "string" }
          - name: "footer"
            label: "Footer"
            widget: "object"
            fields:
              - { name: "tagline", label: "Tagline", widget: "text" }
              - name: "columns"
                label: "Sütunlar"
                widget: "list"
                fields:
                  - { name: "title", label: "Başlık", widget: "string" }
                  - name: "links"
                    label: "Linkler"
                    widget: "list"
                    fields:
                      - { name: "label", label: "Etiket", widget: "string" }
                      - { name: "href", label: "Bağlantı", widget: "string" }
              - { name: "legal", label: "Yasal", widget: "string" }
              - { name: "certifications", label: "Sertifikalar", widget: "string" }
              - { name: "mark", label: "Mark", widget: "string" }

      - name: "hero"
        label: "Hero"
        file: "src/data/hero.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - name: "titleLines"
            label: "Başlık satırları (3)"
            widget: "list"
            field: { name: "line", label: "Satır", widget: "string" }
          - { name: "accentLastLine", label: "Son satır accent (mavi)", widget: "boolean", default: true }
          - { name: "paragraph", label: "Paragraf", widget: "text", hint: "**kalın** Markdown destekli" }
          - { name: "image", label: "Hero görseli URL", widget: "string" }
          - name: "primaryCta"
            label: "Birincil CTA"
            widget: "object"
            fields:
              - { name: "label", label: "Etiket", widget: "string" }
              - { name: "href", label: "Bağlantı", widget: "string" }
          - name: "secondaryCta"
            label: "İkincil CTA"
            widget: "object"
            fields:
              - { name: "label", label: "Etiket", widget: "string" }
              - { name: "href", label: "Bağlantı", widget: "string" }

      - name: "manifesto"
        label: "Manifesto / İstatistikler"
        file: "src/data/manifesto.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "titleLine1", label: "Başlık satır 1", widget: "string" }
          - { name: "titleLine2", label: "Başlık satır 2 (mavi)", widget: "string" }
          - name: "stats"
            label: "İstatistikler (4)"
            widget: "list"
            fields:
              - { name: "value", label: "Değer", widget: "number", value_type: "float" }
              - { name: "suffix", label: "Sonek", widget: "string", required: false }
              - { name: "label", label: "Etiket", widget: "string" }

      - name: "about"
        label: "Hakkımızda"
        file: "src/data/about.json"
        format: "json"
        fields:
          - { name: "number", label: "Numara", widget: "string" }
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title", label: "Başlık", widget: "string" }
          - { name: "paragraph", label: "Paragraf", widget: "text" }
          - name: "values"
            label: "Değerler"
            widget: "list"
            field: { name: "v", label: "Madde", widget: "string" }

      - name: "contact"
        label: "İletişim Bölümü"
        file: "src/data/contact.json"
        format: "json"
        fields:
          - { name: "number", label: "Numara", widget: "string" }
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "title", label: "Başlık", widget: "string" }
          - { name: "paragraph", label: "Paragraf", widget: "text" }

  - name: "services"
    label: "Hizmetler"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { name: "order", label: "Sıra", widget: "number", value_type: "int" }
      - { name: "number", label: "Numara (01, 02…)", widget: "string" }
      - { name: "title", label: "Başlık", widget: "string" }
      - { name: "description", label: "Açıklama", widget: "text" }
      - name: "bullets"
        label: "Maddeler"
        widget: "list"
        field: { name: "b", label: "Madde", widget: "string" }

  - name: "cases"
    label: "Çalışmalar"
    folder: "src/content/cases"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { name: "order", label: "Sıra", widget: "number", value_type: "int" }
      - { name: "sector", label: "Sektör", widget: "string" }
      - { name: "year", label: "Yıl", widget: "string" }
      - { name: "title", label: "Başlık", widget: "string" }
      - { name: "metric", label: "Metrik", widget: "string" }
      - { name: "metricLabel", label: "Metrik etiketi", widget: "string" }

  - name: "insights"
    label: "Yazılar"
    folder: "src/content/insights"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { name: "order", label: "Sıra", widget: "number", value_type: "int" }
      - { name: "date", label: "Tarih (gg.aa.yy)", widget: "string" }
      - { name: "category", label: "Kategori", widget: "string" }
      - { name: "title", label: "Başlık", widget: "string" }
      - { name: "readMinutes", label: "Okuma süresi (dk)", widget: "number", value_type: "int" }
